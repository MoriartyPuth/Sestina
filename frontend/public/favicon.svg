<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Background rounded card -->
  <rect width="32" height="32" rx="6" fill="#0A0A0A" stroke="#262626" stroke-width="1.5" />
  
  <!-- Pixel Matrix Representation (2x2 Grid) -->
  <!-- Top-left: Gold (ASCII_RD) -->
  <rect x="5" y="5" width="10" height="10" rx="1.5" fill="#D97706" />
  
  <!-- Top-right: Titanium White (OPCODE) -->
  <rect x="17" y="5" width="10" height="10" rx="1.5" fill="#E5E5E5" />
  
  <!-- Bottom-left: Crimson Red (NOP_BRK) -->
  <rect x="5" y="17" width="10" height="10" rx="1.5" fill="#DC2626" />
  
  <!-- Bottom-right: Slate Gray (NULL_PAD) -->
  <rect x="17" y="17" width="10" height="10" rx="1.5" fill="#262626" stroke="#404040" stroke-width="1" />
</svg>